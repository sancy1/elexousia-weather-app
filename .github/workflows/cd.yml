name: CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Build Docker image (Render verification)
        working-directory: ./backend
        run: |
          docker build -t elexousia-weather-backend:verify .
      
      - name: Verify Docker image
        run: |
          docker images | grep elexousia-weather-backend
      
      - name: Deployment notification
        run: |
          echo "✅ Docker build successful - Render will auto-deploy from main branch"
          echo "🚀 Deployment URL: https://elexousia-weather-app-backend.onrender.com"